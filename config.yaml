llm:
  provider: openai-compatible
  base_url: https://vg.v1api.cc/v1
  model: deepseek-v3-0324
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.9
  max_tokens: 800

bot:
  prompt_file: prompts/default.md
  max_history_messages: 10

wechat:
  contacts:
    - name: 清欢
      enabled: true
      prompt_file: prompts/default.md
  poll_interval_seconds: 1
  chat_open_timeout_seconds: 5
  listen_setup_delay_seconds: 2.5
  listen_setup_retries: 3
  reply_delay_seconds: 1.2
  max_reply_parts: 6
  debug_messages: true
